email.verification.content: "<p>Здравствуйте! Вы выполняете подтверждение email для {{.SystemName}}.</p><p>Ваш код подтверждения: <strong>{{.Code}}</strong></p><p>Код действителен {{.Minutes}} минут. Если это были не вы, просто проигнорируйте это письмо.</p>"
