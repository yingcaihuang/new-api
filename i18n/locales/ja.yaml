email.password_reset.content: "<p>こんにちは、{{.SystemName}} のパスワード再設定を実行しています。</p><p><a href='{{.Link}}'>こちら</a> をクリックしてパスワードを再設定してください。</p><p>リンクをクリックできない場合は、次の URL をブラウザに貼り付けて開いてください:<br> {{.Link}} </p><p>このリンクの有効期限は {{.Minutes}} 分です。心当たりがない場合はこのメールを無視してください。</p>"
