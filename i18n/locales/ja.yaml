# Email messages
email.verification.subject: "{{.SystemName}} メール認証"
email.verification.content: "<p>こんにちは、{{.SystemName}} のメール認証を実行しています。</p><p>認証コード: <strong>{{.Code}}</strong></p><p>このコードの有効期限は {{.Minutes}} 分です。心当たりがない場合はこのメールを無視してください。</p>"
